<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu CRM Local</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 font-sans">
    <div class="flex h-screen">
        <aside class="w-64 bg-indigo-900 text-white p-6">
            <h1 class="text-2xl font-bold mb-10"><i class="fas fa-chart-line mr-2"></i> CRM Local</h1>
            <nav><ul class="space-y-4"><li class="bg-indigo-800 p-3 rounded-lg"><i class="fas fa-users mr-3"></i> Clientes</li></ul></nav>
        </aside>
        <main class="flex-1 p-8">
            <header class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-semibold text-gray-800">Gestão de Clientes</h2>
            </header>
            <div class="bg-white rounded-xl shadow-sm overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-gray-50">
                        <tr><th class="p-4">Nome</th><th class="p-4">Contato</th><th class="p-4">Status</th></tr>
                    </thead>
                    <tbody id="client-list"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const SHEET_URL = 'https://script.google.com/macros/s/AKfycbwKIcq93smFI4V6D0RAh5NNZuBHa1MYdEDMSp7O7JfFTrsp1jm_9owfR4U77blGONPV/exec';

        async function carregarClientes() {
            const list = document.getElementById('client-list');
            try {
                const response = await fetch(SHEET_URL);
                const data = await response.json();
                list.innerHTML = data.map(c => `
                    <tr class="border-t">
                        <td class="p-4">${c.nome}</td>
                        <td class="p-4">${c.contato}</td>
                        <td class="p-4"><span class="bg-green-100 text-green-800 px-2 py-1 rounded-full text-xs">${c.status}</span></td>
                    </tr>
                `).join('');
            } catch (e) {
                list.innerHTML = '<tr><td class="p-4 text-red-500">Erro ao carregar dados.</td></tr>';
            }
        }
        carregarClientes();
    </script>
</body>
</html>
