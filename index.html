<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu CRM Local</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 font-sans">

    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-indigo-900 text-white p-6">
            <h1 class="text-2xl font-bold mb-10"><i class="fas fa-chart-line mr-2"></i> CRM Local</h1>
            <nav>
                <ul class="space-y-4">
                    <li onclick="showPage('clientes')" class="nav-item p-3 rounded-lg cursor-pointer hover:bg-indigo-800"><i class="fas fa-users mr-3"></i> Clientes</li>
                    <li onclick="showPage('agenda')" class="nav-item p-3 rounded-lg cursor-pointer hover:bg-indigo-800"><i class="fas fa-calendar-alt mr-3"></i> Agenda</li>
                    <li onclick="showPage('config')" class="nav-item p-3 rounded-lg cursor-pointer hover:bg-indigo-800"><i class="fas fa-cog mr-3"></i> Configurações</li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-8 overflow-y-auto">
            
            <!-- ABA CLIENTES -->
            <div id="clientes" class="page">
                <header class="flex justify-between items-center mb-8">
                    <h2 class="text-3xl font-semibold text-gray-800">Clientes</h2>
                    <button onclick="toggleModal(true)" class="bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 transition">
                        <i class="fas fa-plus mr-2"></i> Novo Cliente
                    </button>
                </header>

                <div class="mb-6">
                    <input type="text" id="search" onkeyup="filterClientes()" placeholder="Buscar cliente..." class="w-full p-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>

                <div class="bg-white rounded-xl shadow-sm overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50">
                            <tr><th class="p-4">Nome</th><th class="p-4">Contato</th><th class="p-4">Status</th></tr>
                        </thead>
                        <tbody id="client-list"></tbody>
                    </table>
                </div>
            </div>

            <!-- ABA AGENDA -->
            <div id="agenda" class="page hidden">
                <h2 class="text-3xl font-semibold text-gray-800">Minha Agenda</h2>
                <div class="mt-8 bg-white p-10 rounded-xl shadow-sm text-center text-gray-400">
                    <i class="fas fa-calendar-times text-5xl mb-4"></i>
                    <p>Funcionalidade em desenvolvimento.</p>
                </div>
            </div>

            <!-- ABA CONFIG -->
            <div id="config" class="page hidden">
                <h2 class="text-3xl font-semibold text-gray-800">Configurações</h2>
                <p class="mt-4 text-gray-600">Gerencie as preferências da sua conta aqui.</p>
            </div>
        </main>
    </div>

    <!-- Modal Novo Cliente -->
    <div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
        <div class="bg-white p-8 rounded-xl w-96">
            <h3 class="text-xl font-bold mb-4">Novo Cliente</h3>
            <input type="text" id="novoNome" placeholder="Nome" class="w-full p-2 mb-3 border rounded">
            <input type="text" id="novoContato" placeholder="Contato" class="w-full p-2 mb-4 border rounded">
            <div class="flex justify-end space-x-3">
                <button onclick="toggleModal(false)" class="text-gray-500">Cancelar</button>
                <button onclick="salvarCliente()" class="bg-indigo-600 text-white px-4 py-2 rounded">Salvar</button>
            </div>
        </div>
    </div>

    <script>
        const SHEET_URL = 'https://script.google.com/macros/s/AKfycbwKIcq93smFI4V6D0RAh5NNZuBHa1MYdEDMSp7O7JfFTrsp1jm_9owfR4U77blGONPV/exec';

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function toggleModal(show) {
            document.getElementById('modal').classList.toggle('hidden', !show);
        }

        async function carregarClientes() {
            const res = await fetch(SHEET_URL);
            window.clientesData = await res.json();
            renderTable(window.clientesData);
        }

        function renderTable(data) {
            const list = document.getElementById('client-list');
            list.innerHTML = data.map(c => `
                <tr class="border-t">
                    <td class="p-4">${c.nome}</td>
                    <td class="p-4">${c.contato}</td>
                    <td class="p-4"><span class="bg-green-100 text-green-800 px-2 py-1 rounded-full text-xs">${c.status}</span></td>
                </tr>
            `).join('');
        }

        function filterClientes() {
            const q = document.getElementById('search').value.toLowerCase();
            const filtrados = window.clientesData.filter(c => c.nome.toLowerCase().includes(q));
            renderTable(filtrados);
        }

        async function salvarCliente() {
            const data = { nome: document.getElementById('novoNome').value, contato: document.getElementById('novoContato').value };
            await fetch(SHEET_URL, { method: 'POST', body: JSON.stringify(data) });
            toggleModal(false);
            carregarClientes();
        }

        carregarClientes();
    </script>
</body>
</html>
