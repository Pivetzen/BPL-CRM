<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Pro Local</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50">
    <div class="flex h-screen">
        <aside id="sidebar" class="w-64 bg-indigo-900 text-white p-6">
            <h1 class="text-2xl font-bold mb-10">CRM Pro</h1>
            <ul class="space-y-4">
                <li onclick="showPage('clientes')" class="cursor-pointer hover:underline"><i class="fas fa-users mr-2"></i> Clientes</li>
                <li onclick="showPage('agenda')" class="cursor-pointer hover:underline"><i class="fas fa-calendar-alt mr-2"></i> Agenda</li>
                <li onclick="showPage('config')" class="cursor-pointer hover:underline"><i class="fas fa-cog mr-2"></i> Config</li>
            </ul>
        </aside>

        <main class="flex-1 p-8 overflow-y-auto">
            <div id="dashboard" class="grid grid-cols-3 gap-6 mb-8">
                <div class="bg-white p-6 rounded-xl shadow">
                    <p class="text-gray-500">Total Clientes</p>
                    <h3 id="total-clientes" class="text-2xl font-bold">0</h3>
                </div>
                <div class="bg-white p-6 rounded-xl shadow">
                    <p class="text-gray-500">Taxa de Conversão</p>
                    <h3 id="taxa-conversao" class="text-2xl font-bold">0%</h3>
                </div>
            </div>

            <div id="clientes" class="page bg-white p-6 rounded-xl shadow">
                <table class="w-full">
                    <thead class="text-left border-b"><tr><th>Nome</th><th>Contato</th><th>Segmento</th><th>Status</th><th>Notas</th></tr></thead>
                    <tbody id="client-list"></tbody>
                </table>
            </div>

            <div id="agenda" class="page hidden">...</div>
            <div id="config" class="page hidden">...</div>
        </main>
    </div>

    <script>
        const SHEET_URL = 'COLE_SUA_URL_AQUI';

        async function carregarTudo() {
            const res = await fetch(SHEET_URL);
            const dados = await res.json();
            
            // Cálculos
            const total = dados.clientes.length;
            const fechados = dados.clientes.filter(c => c.status === 'Fechado').length;
            document.getElementById('total-clientes').innerText = total;
            document.getElementById('taxa-conversao').innerText = total > 0 ? ((fechados/total)*100).toFixed(0) + '%' : '0%';

            // Renderiza com WhatsApp e Notas
            document.getElementById('client-list').innerHTML = dados.clientes.map(c => `
                <tr class="border-b">
                    <td class="p-4 font-semibold">${c.nome}</td>
                    <td class="p-4">
                        <a href="https://wa.me/55${c.contato.replace(/\D/g, '')}" target="_blank" class="text-green-600"><i class="fab fa-whatsapp"></i> ${c.contato}</a>
                    </td>
                    <td class="p-4"><span class="bg-blue-100 text-blue-800 px-2 py-1 rounded text-xs">${c.segmento}</span></td>
                    <td class="p-4"><select onchange="updateStatus('${c.nome}', this.value)" class="border p-1 rounded">${['Ativo', 'Fechado', 'Pendente'].map(s => `<option ${c.status === s ? 'selected' : ''}>${s}</option>`).join('')}</select></td>
                    <td class="p-4"><input type="text" value="${c.notas || ''}" onblur="updateNotas('${c.nome}', this.value)" class="w-full border-b p-1"></td>
                </tr>
            `).join('');
        }

        async function updateStatus(nome, novoStatus) {
            await fetch(SHEET_URL, { method: 'POST', body: JSON.stringify({ action: 'update', nome, novoStatus, notas: '' }) });
            carregarTudo();
        }
        
        // ... (resto das funções de navegação)
        carregarTudo();
    </script>
</body>
</html>
