<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Local</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 font-sans">
    <div class="flex h-screen">
        <aside id="sidebar" class="w-64 bg-indigo-900 text-white p-6">
            <h1 class="text-2xl font-bold mb-10">CRM Local</h1>
            <ul class="space-y-4">
                <li onclick="showPage('clientes')" class="cursor-pointer hover:underline"><i class="fas fa-users mr-2"></i> Clientes</li>
            </ul>
        </aside>

        <main class="flex-1 p-8">
            <h2 class="text-3xl font-semibold mb-6">Gestão de Clientes</h2>
            <div id="client-list" class="bg-white rounded-xl shadow-sm p-6"></div>
        </main>
    </div>

    <script>
        const SHEET_URL = 'https://script.google.com/macros/s/AKfycbwKIcq93smFI4V6D0RAh5NNZuBHa1MYdEDMSp7O7JfFTrsp1jm_9owfR4U77blGONPV/exec';

        async function carregarDados() {
            const res = await fetch(SHEET_URL);
            const dados = await res.json();
            
            document.getElementById('client-list').innerHTML = `
                <table class="w-full">
                    ${dados.clientes.map(c => `
                        <tr class="border-b">
                            <td class="p-4 font-medium">${c.nome}</td>
                            <td class="p-4">${c.contato}</td>
                            <td class="p-4">
                                <select onchange="atualizarStatus('${c.nome}', this.value)" class="bg-gray-100 p-1 rounded border">
                                    <option ${c.status == 'Ativo' ? 'selected' : ''}>Ativo</option>
                                    <option ${c.status == 'Fechado' ? 'selected' : ''}>Fechado</option>
                                    <option ${c.status == 'Pendente' ? 'selected' : ''}>Pendente</option>
                                </select>
                            </td>
                        </tr>
                    `).join('')}
                </table>
            `;
        }

        async function atualizarStatus(nome, novoStatus) {
            await fetch(SHEET_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'update', nome, novoStatus })
            });
            alert('Status atualizado!');
            carregarDados();
        }

        carregarDados();
    </script>
</body>
</html>
