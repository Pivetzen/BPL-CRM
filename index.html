<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Pro Local</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans">
    <div class="flex h-screen">
        <aside id="sidebar" class="w-64 bg-indigo-900 text-white p-6 transition-colors duration-500">
            <h1 class="text-2xl font-bold mb-10"><i class="fas fa-chart-line mr-2"></i> CRM Pro</h1>
            <nav>
                <ul class="space-y-4">
                    <li onclick="showPage('clientes')" class="p-3 rounded-lg cursor-pointer hover:bg-black/20"><i class="fas fa-users mr-3"></i> Clientes</li>
                    <li onclick="showPage('agenda')" class="p-3 rounded-lg cursor-pointer hover:bg-black/20"><i class="fas fa-calendar-alt mr-3"></i> Agenda</li>
                    <li onclick="showPage('config')" class="p-3 rounded-lg cursor-pointer hover:bg-black/20"><i class="fas fa-cog mr-3"></i> Configurações</li>
                </ul>
            </nav>
        </aside>

        <main class="flex-1 p-8 overflow-y-auto">
            <div id="dashboard" class="grid grid-cols-3 gap-6 mb-8">
                <div class="bg-white p-6 rounded-xl shadow border-l-4 border-indigo-500">
                    <p class="text-gray-500 text-sm">Total de Clientes</p>
                    <h3 id="total-clientes" class="text-2xl font-bold">0</h3>
                </div>
                <div class="bg-white p-6 rounded-xl shadow border-l-4 border-green-500">
                    <p class="text-gray-500 text-sm">Taxa de Conversão</p>
                    <h3 id="taxa-conversao" class="text-2xl font-bold">0%</h3>
                </div>
            </div>

            <div id="clientes" class="page">
                <h2 class="text-3xl font-semibold mb-6">Gestão de Clientes</h2>
                <div class="bg-white rounded-xl shadow-sm overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="p-4">Nome</th>
                                <th class="p-4">WhatsApp</th>
                                <th class="p-4">Segmento</th>
                                <th class="p-4">Status</th>
                                <th class="p-4">Notas</th>
                            </tr>
                        </thead>
                        <tbody id="client-list"></tbody>
                    </table>
                </div>
            </div>

            <div id="agenda" class="page hidden">
                <h2 class="text-3xl font-semibold mb-6">Minha Agenda</h2>
                <div id="agenda-list" class="grid grid-cols-1 gap-4"></div>
            </div>

            <div id="config" class="page hidden">
                <h2 class="text-3xl font-semibold mb-6">Configurações</h2>
                <div class="bg-white p-6 rounded-xl shadow-sm">
                    <label class="block mb-2 font-medium">Cor do Sistema:</label>
                    <select id="color-picker" onchange="salvarConfig(this.value)" class="w-full p-2 border rounded-lg">
                        <option value="indigo">Indigo</option>
                        <option value="red">Vermelho</option>
                        <option value="green">Verde</option>
                        <option value="blue">Azul</option>
                        <option value="purple">Roxo</option>
                    </select>
                </div>
            </div>
        </main>
    </div>

    <script>
        const SHEET_URL = 'https://script.google.com/macros/s/AKfycbwKIcq93smFI4V6D0RAh5NNZuBHa1MYdEDMSp7O7JfFTrsp1jm_9owfR4U77blGONPV/exec';

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        async function carregarTudo() {
            const res = await fetch(SHEET_URL);
            const dados = await res.json();
            
            // Aplica cor do tema
            const cor = dados.cor || 'indigo';
            document.getElementById('sidebar').className = `w-64 bg-${cor}-900 text-white p-6 transition-colors duration-500`;
            document.getElementById('color-picker').value = cor;

            // Cálculos
            const total = dados.clientes.length;
            const fechados = dados.clientes.filter(c => c.status === 'Fechado').length;
            document.getElementById('total-clientes').innerText = total;
            document.getElementById('taxa-conversao').innerText = total > 0 ? Math.round((fechados/total)*100) + '%' : '0%';
            
            // Renderiza Clientes
            document.getElementById('client-list').innerHTML = dados.clientes.map(c => `
                <tr class="border-b">
                    <td class="p-4 font-medium">${c.nome}</td>
                    <td class="p-4">
                        <a href="https://wa.me/55${c.contato.replace(/\D/g, '')}" target="_blank" class="text-green-600 hover:underline">
                            <i class="fab fa-whatsapp"></i> ${c.contato}
                        </a>
                    </td>
                    <td class="p-4"><span class="bg-blue-100 text-blue-800 px-2 py-1 rounded text-xs">${c.segmento}</span></td>
                    <td class="p-4">
                        <select onchange="atualizarStatus('${c.nome}', this.value)" class="p-1 border rounded">
                            <option ${c.status == 'Ativo' ? 'selected' : ''}>Ativo</option>
                            <option ${c.status == 'Fechado' ? 'selected' : ''}>Fechado</option>
                            <option ${c.status == 'Pendente' ? 'selected' : ''}>Pendente</option>
                        </select>
                    </td>
                    <td class="p-4"><input type="text" value="${c.notas || ''}" onblur="updateNotas('${c.nome}', this.value)" class="w-full border-b p-1 text-sm outline-none"></td>
                </tr>
            `).join('');

            // Renderiza Agenda
            document.getElementById('agenda-list').innerHTML = dados.agenda.map(a => 
                `<div class="bg-white p-4 rounded-lg shadow-sm border-l-4 border-${cor}-500">
                    <p class="font-bold">${a.tarefa}</p>
                    <p class="text-sm text-gray-500">${a.data} - ${a.hora}</p>
                </div>`).join('');
        }

        async function atualizarStatus(nome, novoStatus) {
            await fetch(SHEET_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'update', nome, novoStatus, notas: '' })
            });
            carregarTudo();
        }

        async function updateNotas(nome, notas) {
            await fetch(SHEET_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'update', nome, novoStatus: '', notas })
            });
        }

        async function salvarConfig(cor) {
            await fetch(SHEET_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'saveConfig', cor })
            });
            carregarTudo();
        }

        carregarTudo();
    </script>
</body>
</html>
